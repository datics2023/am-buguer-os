<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Burguer — Panel Andrea</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1D1D1D; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: #E63946; padding: 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .badge { background: #fff; color: #E63946; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; }

  /* TABS */
  .tabs { display: flex; background: #2A2A2A; border-bottom: 1px solid #333; overflow-x: auto; }
  .tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; color: #AAAAAA; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s; min-width: 80px; }
  .tab.active { color: #E63946; border-bottom-color: #E63946; font-weight: 600; }
  .tab .count { display: inline-block; background: #333; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }
  .tab.active .count { background: #E63946; color: #fff; }

  /* LISTA */
  .lista { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* CARD PEDIDO */
  .card { background: #2A2A2A; border-radius: 12px; overflow: hidden; border-left: 4px solid #555; }
  .card.nuevo { border-left-color: #F39C12; }
  .card.pago_confirmado { border-left-color: #3498DB; }
  .card.en_cocina { border-left-color: #E67E22; }
  .card.listo { border-left-color: #2ECC71; }
  .card.en_entrega { border-left-color: #9B59B6; }
  .card.entregado { border-left-color: #95A5A6; }

  .card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
  .card-left { display: flex; flex-direction: column; gap: 4px; }
  .card-numero { font-size: 16px; font-weight: 700; color: #F4A261; }
  .card-cliente { font-size: 14px; color: #fff; }
  .card-tipo { font-size: 12px; color: #AAAAAA; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .card-total { font-size: 16px; font-weight: 700; }
  .card-tiempo { font-size: 11px; color: #AAAAAA; }

  .estado-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .estado-nuevo { background: #F39C1233; color: #F39C12; }
  .estado-pago_confirmado { background: #3498DB33; color: #3498DB; }
  .estado-en_cocina { background: #E67E2233; color: #E67E22; }
  .estado-listo { background: #2ECC7133; color: #2ECC71; }
  .estado-en_entrega { background: #9B59B633; color: #9B59B6; }
  .estado-entregado { background: #95A5A633; color: #95A5A6; }

  /* DETALLE */
  .card-detalle { display: none; padding: 0 14px 14px; border-top: 1px solid #333; }
  .card-detalle.open { display: block; }
  .detalle-items { margin: 12px 0 8px; }
  .detalle-item { padding: 6px 0; border-bottom: 1px solid #333; font-size: 13px; display: flex; justify-content: space-between; }
  .detalle-item:last-child { border-bottom: none; }
  .detalle-item-nombre { color: #fff; }
  .detalle-item-precio { color: #F4A261; }
  .detalle-nota { font-size: 12px; color: #AAAAAA; margin-top: 2px; }
  .detalle-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
  .detalle-campo { font-size: 12px; }
  .detalle-campo span { display: block; color: #AAAAAA; margin-bottom: 2px; }
  .detalle-campo strong { color: #fff; }

  /* ACCIONES */
  .acciones { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn:active { opacity: 0.8; }
  .btn-confirmar { background: #2ECC71; color: #fff; }
  .btn-cocina { background: #E67E22; color: #fff; }
  .btn-rechazar { background: transparent; color: #E74C3C; border: 1px solid #E74C3C; padding: 10px; }
  .btn-entrega { background: #9B59B6; color: #fff; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: #AAAAAA; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: #AAAAAA; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #E63946; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2ECC71; color: #fff; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #E74C3C; }

  /* PRIORITARIO */
  .prioridad-badge { background: #E6394622; color: #E63946; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; margin-left: 6px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍔 Panel Andrea</h1>
    <div style="font-size:12px;color:#ffcccc;margin-top:2px" id="ultimo-refresh">Cargando...</div>
  </div>
<div style="display:flex;align-items:center;gap:10px">
    <div class="badge" id="badge-nuevos">0 nuevos</div>
    <button id="btn-toggle" onclick="toggleTienda()" style="background:none;border:2px solid #fff;border-radius:20px;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer">...</button>
    <button onclick="cargarPedidos()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">↻</button>
    <button onclick="cerrarSesion()" style="background:#7d0000;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">Salir</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="filtrar('nuevos')" id="tab-nuevos">🔔 Nuevos <span class="count" id="c-nuevos">0</span></div>
  <div class="tab" onclick="filtrar('confirmados')" id="tab-confirmados">✅ Pago <span class="count" id="c-confirmados">0</span></div>
  <div class="tab" onclick="filtrar('cocina')" id="tab-cocina">🍳 Cocina <span class="count" id="c-cocina">0</span></div>
  <div class="tab" onclick="filtrar('listos')" id="tab-listos">✓ Listos <span class="count" id="c-listos">0</span></div>
  <div class="tab" onclick="filtrar('entregados')" id="tab-entregados">✓✓ Hoy <span class="count" id="c-entregados">0</span></div>
  <div class="tab" onclick="filtrar('todos')" id="tab-todos">Todos <span class="count" id="c-todos">0</span></div>
</div>

<div class="lista" id="lista-pedidos">
  <div class="loading"><div class="spinner"></div><br>Conectando con Supabase...</div>
</div>

<div class="toast" id="toast"></div>

<script src="auth-guard.js"></script>
<script>
const SUPABASE_URL = 'https://ezvjjudhvothkiqyfxtl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dmpqdWRodm90aGtpcXlmeHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjk4ODYsImV4cCI6MjA5MDgwNTg4Nn0.rMLPardNjEIoXkvQIPRxAXjjATBKBUwnPm67oU1ZjM8';

let pedidos = [];
let pedidosEntregados = [];
let tabActiva = 'nuevos';
let tiendaAbierta = true;

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function supabase(endpoint, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    headers,
    ...options
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json();
}

async function cargarPedidos() {
  try {
    const hoy = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

    const [data, entregados, config] = await Promise.all([
      supabase('pedidos?select=*,clientes(nombre,apellido,celular),items_pedido(*,productos(nombre,precio)),metodos_pago(nombre)&estado=neq.entregado&order=hora_creacion.desc'),
      supabase(`pedidos?select=*,clientes(nombre,apellido,celular),items_pedido(*,productos(nombre,precio)),metodos_pago(nombre)&estado=eq.entregado&hora_creacion=gte.${hoy}T00:00:00&order=hora_creacion.desc`),
      supabase('configuracion?clave=eq.tienda_abierta&select=valor')
    ]);

    pedidos = data;
    pedidosEntregados = entregados;

    if (config.length > 0) {
      tiendaAbierta = config[0].valor === 'true';
      actualizarToggle();
    }

    actualizarContadores();
    renderLista();
    document.getElementById('ultimo-refresh').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    mostrarError('Error al cargar pedidos: ' + e.message);
    document.getElementById('lista-pedidos').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p style="color:#E74C3C">Error de conexión.<br>Verifica que Supabase esté activo.</p><br><small style="color:#555">${e.message}</small></div>`;
  }
}

function actualizarContadores() {
  const cnts = {
    nuevos: pedidos.filter(p => p.estado === 'nuevo').length,
    confirmados: pedidos.filter(p => p.estado === 'pago_confirmado').length,
    cocina: pedidos.filter(p => p.estado === 'en_cocina').length,
    listos: pedidos.filter(p => p.estado === 'listo' || p.estado === 'en_entrega').length,
    entregados: pedidosEntregados.length,
    todos: pedidos.length
  };
  for (const [k, v] of Object.entries(cnts)) {
    document.getElementById(`c-${k}`).textContent = v;
  }
  document.getElementById('badge-nuevos').textContent = cnts.nuevos + ' nuevos';
  document.getElementById('badge-nuevos').style.display = cnts.nuevos > 0 ? 'block' : 'none';
}

function filtrar(tab) {
  tabActiva = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderLista();
}

function pedidosFiltrados() {
  if (tabActiva === 'entregados') return pedidosEntregados;
  const mapa = {
    nuevos: ['nuevo'],
    confirmados: ['pago_confirmado'],
    cocina: ['en_cocina'],
    listos: ['listo', 'en_entrega'],
    todos: ['nuevo','pago_confirmado','en_cocina','listo','en_entrega','entregado']
  };
  return pedidos.filter(p => mapa[tabActiva].includes(p.estado));
}

function renderLista() {
  const lista = document.getElementById('lista-pedidos');
  const filtrados = pedidosFiltrados();

  if (filtrados.length === 0) {
    lista.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Sin pedidos en esta vista</p></div>`;
    return;
  }

  lista.innerHTML = filtrados.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const cliente = p.clientes;
  const nombre = cliente ? `${cliente.nombre || ''} ${cliente.apellido || ''}`.trim() || 'Cliente' : 'Cliente';
  const items = p.items_pedido || [];
  const total = formatCOP(p.total);
  const tiempo = tiempoDesde(p.hora_creacion);
  const tipoLabel = p.tipo_entrega === 'domicilio' ? '🛵 Domicilio' : '🏠 Presencial';
  const prioLabel = p.es_prioritario ? '<span class="prioridad-badge">⚡ PRIO</span>' : '';
  const estadoLabel = etiquetaEstado(p.estado);

  const acciones = renderAcciones(p);

  const itemsHtml = items.map(i => `
    <div class="detalle-item">
      <div>
        <div class="detalle-item-nombre">${i.cantidad}x ${i.productos?.nombre || 'Producto'}</div>
        ${i.extras ? `<div class="detalle-nota">+ ${i.extras}</div>` : ''}
        ${i.exclusiones ? `<div class="detalle-nota">− ${i.exclusiones}</div>` : ''}
      </div>
      <div class="detalle-item-precio">${formatCOP(i.subtotal)}</div>
    </div>
  `).join('');

  return `
  <div class="card ${p.estado}" id="card-${p.id}">
    <div class="card-header" onclick="toggleDetalle('${p.id}')">
      <div class="card-left">
        <div class="card-numero">AM-${String(p.numero_pedido).padStart(4,'0')} ${prioLabel}</div>
        <div class="card-cliente">${nombre}</div>
        <div class="card-tipo">${tipoLabel} · ${p.metodos_pago?.nombre || 'Pago pendiente'}</div>
      </div>
      <div class="card-right">
        <div class="card-total">${total}</div>
        <div class="${'estado-badge estado-'+p.estado}">${estadoLabel}</div>
        <div class="card-tiempo">${tiempo}</div>
      </div>
    </div>
    <div class="card-detalle" id="detalle-${p.id}">
      <div class="detalle-items">${itemsHtml}</div>
      ${p.tipo_entrega === 'domicilio' ? `
      <div class="detalle-info">
        <div class="detalle-campo"><span>Dirección</span><strong>${p.direccion_entrega || '—'}</strong></div>
        <div class="detalle-campo"><span>Celular</span><strong>${cliente?.celular || '—'}</strong></div>
      </div>` : ''}
      ${p.notas ? `<div style="background:#1D1D1D;border-radius:8px;padding:10px;margin:8px 0;font-size:13px;color:#AAAAAA">📝 ${p.notas}</div>` : ''}
      <div class="acciones">${acciones}</div>
    </div>
  </div>`;
}

function renderAcciones(p) {
  switch(p.estado) {
    case 'nuevo':
      return `
        <button class="btn btn-confirmar" onclick="cambiarEstado('${p.id}','pago_confirmado',event)">✅ Confirmar pedido</button>
        <button class="btn btn-rechazar" onclick="cambiarEstado('${p.id}','rechazado',event)">✗ Rechazar pedido</button>`;
    case 'pago_confirmado':
      return `<button class="btn btn-cocina" onclick="cambiarEstado('${p.id}','en_cocina',event)">🍳 Enviar a cocina</button>`;
    case 'en_cocina':
      return `<div style="text-align:center;color:#E67E22;padding:8px;font-size:13px">⏳ En preparación — cocina marca listo</div>`;
    case 'listo':
      if (p.tipo_entrega === 'domicilio') {
        return `<button class="btn btn-entrega" onclick="cambiarEstado('${p.id}','en_entrega',event)">🛵 Asignar domiciliario</button>`;
      }
      return `<button class="btn btn-confirmar" onclick="cambiarEstado('${p.id}','entregado',event)">✓ Entregado en tráiler</button>`;
    case 'en_entrega':
      return `<div style="text-align:center;color:#9B59B6;padding:8px;font-size:13px">🛵 En camino — domiciliario confirma</div>`;
    default:
      return '';
  }
}

function toggleDetalle(id) {
  const detalle = document.getElementById(`detalle-${id}`);
  detalle.classList.toggle('open');
}

async function cambiarEstado(id, nuevoEstado, e) {
  e.stopPropagation();
  const btn = e.target;
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const campos = { estado: nuevoEstado };
  if (nuevoEstado === 'en_cocina') campos.hora_cocina = new Date().toISOString();
  if (nuevoEstado === 'entregado') campos.hora_entrega = new Date().toISOString();

  try {
    await supabase(`pedidos?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify(campos)
    });
    mostrarToast(mensajeEstado(nuevoEstado));
    await cargarPedidos();
  } catch(err) {
    mostrarToast('Error: ' + err.message, true);
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
}

// HELPERS
function formatCOP(valor) {
  if (!valor) return '$0';
  return '$' + Number(valor).toLocaleString('es-CO');
}

function tiempoDesde(iso) {
  if (!iso) return '';
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return 'Ahora';
  if (mins < 60) return `hace ${mins} min`;
  return `hace ${Math.floor(mins/60)}h ${mins%60}m`;
}

function etiquetaEstado(estado) {
  const map = {
    nuevo: '🔔 Nuevo',
    pago_confirmado: '✅ Pedido OK',
    en_cocina: '🍳 Cocina',
    listo: '✓ Listo',
    en_entrega: '🛵 En camino',
    entregado: '✓✓ Entregado'
  };
  return map[estado] || estado;
}

function mensajeEstado(estado) {
  const map = {
    pago_confirmado: '✅ Pago confirmado',
    en_cocina: '🍳 Enviado a cocina',
    en_entrega: '🛵 Domiciliario asignado',
    entregado: '✓ Pedido entregado',
    rechazado: '✗ Pedido rechazado'
  };
  return map[estado] || 'Estado actualizado';
}

function actualizarToggle() {
  const btn = document.getElementById('btn-toggle');
  if (tiendaAbierta) {
    btn.textContent = '🟢 Abierto';
    btn.style.borderColor = '#2ECC71';
    btn.style.color = '#2ECC71';
  } else {
    btn.textContent = '🔴 Cerrado';
    btn.style.borderColor = '#E74C3C';
    btn.style.color = '#E74C3C';
  }
}

async function toggleTienda() {
  const nuevo = !tiendaAbierta;
  const label = nuevo ? 'abrir' : 'cerrar';
  if (!confirm(`¿Confirmas ${label} el negocio?`)) return;

  try {
    await supabase('configuracion?clave=eq.tienda_abierta', {
      method: 'PATCH',
      body: JSON.stringify({ valor: String(nuevo), actualizado_en: new Date().toISOString() })
    });
    tiendaAbierta = nuevo;
    actualizarToggle();
    mostrarToast(nuevo ? '🟢 Negocio abierto' : '🔴 Negocio cerrado');
  } catch(e) {
    mostrarToast('Error: ' + e.message, true);
  }
}

function mostrarToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function mostrarError(msg) {
  mostrarToast(msg, true);
}

// Auto-refresh cada 30 segundos
cargarPedidos();
setInterval(cargarPedidos, 30000);
</script>
</body>
</html>

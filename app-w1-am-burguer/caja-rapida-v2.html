<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AM Burguer — Caja Rápida v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --red: #E63946;
    --orange: #F4A261;
    --bg: #111111;
    --card: #1E1E1E;
    --card2: #252525;
    --border: #333333;
    --text: #FFFFFF;
    --muted: #888888;
    --green: #2ECC71;
    --yellow: #F39C12;
    --blue: #3498DB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--red);
  }
  .header-logo span { color: var(--orange); }
  .header-time {
    font-size: 12px;
    color: var(--muted);
  }
  .header-badge {
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }

  /* MAIN LAYOUT */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* VISTA: NUEVO PEDIDO */
  .view { display: none; flex-direction: column; flex: 1; }
  .view.active { display: flex; }

  /* CATEGORÍAS */
  .cats {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--card);
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .cat-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #111;
  }

  /* PRODUCTOS */
  .products-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    padding-bottom: 200px;
  }
  .products-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .product-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    active-scale: 0.97;
  }
  .product-card:active { transform: scale(0.97); border-color: var(--orange); }
  .product-card.in-cart { border-color: var(--orange); background: #2a1f0e; }
  .product-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .product-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--orange);
  }
  .product-qty {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--red);
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product-add-btn {
    margin-top: 8px;
    width: 100%;
    padding: 8px 0;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .product-qty-ctrl {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: white;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }
  .qty-num {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
  }

  /* CARRITO FLOTANTE */
  .cart-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-top: 1px solid var(--border);
    z-index: 40;
    transition: max-height 0.3s ease;
  }
  .cart-summary {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    cursor: pointer;
  }
  .cart-icon {
    background: var(--red);
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .cart-info { flex: 1; }
  .cart-items-count { font-size: 13px; color: var(--muted); }
  .cart-total { font-size: 20px; font-weight: 700; }
  .cart-confirm-btn {
    background: var(--green);
    color: #111;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .cart-confirm-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  /* CART DETAIL */
  .cart-detail {
    display: none;
    padding: 0 16px 12px;
    border-top: 1px solid var(--border);
    max-height: 45vh;
    overflow-y: auto;
  }
  .cart-detail.open { display: block; }
  .cart-item-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .cart-item-row:last-child { border-bottom: none; }
  .ci-name { flex: 1; font-size: 14px; font-weight: 600; }
  .ci-price { font-size: 13px; color: var(--orange); font-weight: 600; margin-right: 8px; }
  .ci-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; }

  .notas-input {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    margin-top: 10px;
    resize: none;
  }
  .notas-input::placeholder { color: var(--muted); }
  .notas-input:focus { outline: none; border-color: var(--orange); }

  /* PAGO ROW */
  .pago-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .pago-btn {
    flex: 1;
    min-width: 80px;
    padding: 9px 0;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .pago-btn.active {
    border-color: var(--blue);
    color: var(--blue);
    background: #0d1e2d;
  }

  /* VISTA: PEDIDOS */
  .orders-view {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    padding-bottom: 20px;
  }
  .order-card {
    background: var(--card);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .order-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
  }
  .order-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--orange);
    flex-shrink: 0;
  }
  .order-meta { flex: 1; }
  .order-client { font-size: 13px; font-weight: 600; }
  .order-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .order-status {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-cocina { background: #3a1f00; color: var(--yellow); }
  .status-listo { background: #0d2e1a; color: var(--green); }
  .status-entrega { background: #1a0d2e; color: #9B59B6; }
  .status-nuevo { background: #2a1500; color: var(--orange); }

  .order-items {
    padding: 0 14px 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
  }
  .order-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .order-total { font-size: 15px; font-weight: 700; }
  .order-actions { display: flex; gap: 8px; }
  .act-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .act-btn.green { background: var(--green); color: #111; }
  .act-btn.gray { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }

  /* SUCCESS OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    background: var(--card);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    border: 1.5px solid var(--green);
  }
  .overlay-icon { font-size: 52px; margin-bottom: 8px; }
  .overlay-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--orange);
    letter-spacing: 2px;
  }
  .overlay-msg { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .overlay-btn {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #111;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state div { font-size: 40px; margin-bottom: 12px; }

  /* FILTER TABS for orders */
  .filter-tabs {
    display: flex;
    padding: 10px 12px 0;
    gap: 8px;
  }
  .filter-tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    background: var(--card2);
    color: var(--muted);
    border: 1.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .filter-tab.active { background: #1E1E1E; border-color: var(--orange); color: var(--orange); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 0 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">AM <span>BURGUER</span></div>
  <div class="header-badge">CAJA RÁPIDA</div>
  <div class="header-time" id="clock">--:--</div>
  <button onclick="cerrarSesion()" style="background:#7d0000;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600">Salir</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showView('nuevo')">🛒 Nuevo pedido</div>
  <div class="tab" onclick="showView('pedidos')">📋 Pedidos <span id="pedidos-count" style="display:none;background:#E63946;color:white;border-radius:12px;padding:1px 7px;font-size:11px;margin-left:4px;">0</span></div>
</div>

<!-- VISTA: NUEVO PEDIDO -->
<div class="view active" id="view-nuevo">
  <div class="cats" id="cats-bar">
    <button class="cat-btn active" onclick="filterCat('all', this)">Todo</button>
    <button class="cat-btn" onclick="filterCat('hamburguesa', this)">🍔 Hambur.</button>
    <button class="cat-btn" onclick="filterCat('perro', this)">🌭 Perros</button>
    <button class="cat-btn" onclick="filterCat('especial', this)">⭐ Espec.</button>
    <button class="cat-btn" onclick="filterCat('bebida', this)">🥤 Bebidas</button>
  </div>

  <div class="products-area">
    <div class="products-grid" id="products-grid"></div>
  </div>

  <div class="cart-panel" id="cart-panel">
    <div class="pago-row" id="pago-row" style="padding: 8px 16px 0;"></div>
    <div class="cart-summary" onclick="toggleCart()">
      <div class="cart-icon">🛒</div>
      <div class="cart-info">
        <div class="cart-items-count" id="cart-count">0 productos</div>
        <div class="cart-total" id="cart-total">$0</div>
      </div>
      <button class="cart-confirm-btn" id="confirm-btn" onclick="confirmPedido(event)" disabled>
        Enviar a cocina ↑
      </button>
    </div>
    <div class="cart-detail" id="cart-detail">
      <div id="cart-items-list"></div>
      <textarea class="notas-input" id="notas-field" rows="2" placeholder="Notas del pedido (opcional)..."></textarea>
    </div>
  </div>
</div>

<!-- VISTA: PEDIDOS -->
<div class="view" id="view-pedidos">
  <div class="filter-tabs">
    <div class="filter-tab active" onclick="filterOrders('activos', this)">Activos</div>
    <div class="filter-tab" onclick="filterOrders('cocina', this)">En cocina</div>
    <div class="filter-tab" onclick="filterOrders('todos', this)">Todos</div>
  </div>
  <div class="orders-view" id="orders-list"></div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-icon">🍔</div>
    <div style="font-size:14px;color:#888;margin-bottom:4px;">Pedido enviado a cocina</div>
    <div class="overlay-code" id="overlay-code">AM-1051</div>
    <div class="overlay-msg" id="overlay-items"></div>
    <button class="overlay-btn" onclick="closeOverlay()">✓ Siguiente pedido</button>
  </div>
</div>

<script src="auth-guard.js"></script>
<script>
// ── SUPABASE ──────────────────────────────────────────
const SUPABASE_URL = 'https://ezvjjudhvothkiqyfxtl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dmpqdWRodm90aGtpcXlmeHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjk4ODYsImV4cCI6MjA5MDgwNTg4Nn0.rMLPardNjEIoXkvQIPRxAXjjATBKBUwnPm67oU1ZjM8';
const PAGO_EFECTIVO_ID = 'cb0e92db-356c-4460-aed9-524aaea8eec1';

const sbHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function sbGet(endpoint) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { headers: sbHeaders });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbPost(endpoint, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    method: 'POST', headers: sbHeaders, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbPatch(endpoint, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    method: 'PATCH', headers: sbHeaders, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── DATOS ────────────────────────────────────────────
let MENU = [];
let cart = {};
let pagoSelected = { id: PAGO_EFECTIVO_ID, nombre: 'Efectivo' };
let cartOpen = false;
let pedidos = [];
let currentFilter = 'activos';
let currentCat = 'all';

// ── RELOJ ────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

// ── RENDERIZAR PRODUCTOS ──────────────────────────────
function fmt(n) { return '$' + n.toLocaleString('es-CO'); }

function renderProducts(cat = 'all') {
  const grid = document.getElementById('products-grid');
  const list = cat === 'all' ? MENU : MENU.filter(p => p.cat === cat);
  grid.innerHTML = list.map(p => {
    const qty = cart[p.id] ? cart[p.id].qty : 0;
    return `
      <div class="product-card ${qty > 0 ? 'in-cart' : ''}" id="pc-${p.id}">
        ${qty > 0 ? `<div class="product-qty">${qty}</div>` : ''}
        <div class="product-name">${p.nombre}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-price">${fmt(p.precio)}</div>
        ${qty === 0
          ? `<button class="product-add-btn" onclick="addToCart('${p.id}')">+ Agregar</button>`
          : `<div class="product-qty-ctrl">
              <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
              <div class="qty-num">${qty}</div>
              <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
             </div>`
        }
      </div>
    `;
  }).join('');
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProducts(cat);
}

// ── CARRITO ───────────────────────────────────────────
function addToCart(id) {
  const p = MENU.find(x => x.id === id);
  cart[id] = { ...p, qty: 1 };
  updateCart();
  renderProducts(currentCat);
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCart();
  renderProducts(currentCat);
}

function removeFromCart(id) {
  delete cart[id];
  updateCart();
  renderProducts(currentCat);
}

function updateCart() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.precio * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cart-count').textContent = count + ' producto' + (count !== 1 ? 's' : '');
  document.getElementById('cart-total').textContent = fmt(total);
  document.getElementById('confirm-btn').disabled = count === 0;

  // items list
  document.getElementById('cart-items-list').innerHTML = items.map(i => `
    <div class="cart-item-row">
      <div class="ci-name">${i.qty}× ${i.nombre}</div>
      <div class="ci-price">${fmt(i.precio * i.qty)}</div>
      <button class="ci-del" onclick="removeFromCart('${i.id}')">✕</button>
    </div>
  `).join('');
}

function toggleCart() {
  cartOpen = !cartOpen;
  document.getElementById('cart-detail').classList.toggle('open', cartOpen);
}

function selectPago(el, id, nombre) {
  pagoSelected = { id, nombre };
  document.querySelectorAll('.pago-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── CONFIRMAR PEDIDO ──────────────────────────────────
async function confirmPedido(e) {
  e.stopPropagation();
  const items = Object.values(cart);
  if (items.length === 0) return;

  const btn = e.target;
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const total = items.reduce((s, i) => s + i.precio * i.qty, 0);
  const resumen = items.map(i => `${i.qty}× ${i.nombre}`).join(', ');
  const notas = document.getElementById('notas-field').value.trim();

  try {
    // Insertar pedido presencial (sin cliente, directo a en_cocina)
    const [pedidoNuevo] = await sbPost('pedidos', {
      tipo_entrega: 'presencial',
      estado: 'en_cocina',
      hora_cocina: new Date().toISOString(),
      metodo_pago_id: pagoSelected.id,
      total,
      notas: notas || null
    });

    // Insertar items
    const itemsPayload = items.map(i => ({
      pedido_id: pedidoNuevo.id,
      producto_id: i.id,
      cantidad: i.qty,
      subtotal: i.precio * i.qty
    }));
    await sbPost('items_pedido', itemsPayload);

    const code = `AM-${String(pedidoNuevo.numero_pedido).padStart(4,'0')}`;
    document.getElementById('overlay-code').textContent = code;
    document.getElementById('overlay-items').textContent = resumen;
    document.getElementById('overlay').classList.add('show');
    await cargarPedidos();
  } catch(err) {
    alert('Error al guardar pedido: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Confirmar pedido';
  }
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  cart = {};
  cartOpen = false;
  document.getElementById('cart-detail').classList.remove('open');
  document.getElementById('notas-field').value = '';
  document.getElementById('notas-field').value = '';
  // reset pago
  const botonesP = document.querySelectorAll('.pago-btn');
  if (botonesP.length > 0) {
    botonesP.forEach(b => b.classList.remove('active'));
    botonesP[0].classList.add('active');
    botonesP[0].click();
  }
  updateCart();
  renderProducts(currentCat);
}

// ── PEDIDOS VIEW ──────────────────────────────────────
function updatePedidosCount() {
  const activos = pedidos.filter(p => p.estado === 'en_cocina' || p.estado === 'nuevo').length;
  const badge = document.getElementById('pedidos-count');
  badge.textContent = activos;
  badge.style.display = activos > 0 ? 'inline' : 'none';
}

function filterOrders(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  let filtered = pedidos;
  if (currentFilter === 'activos') filtered = pedidos.filter(p => ['nuevo','en_cocina','listo','en_entrega'].includes(p.estado));
  if (currentFilter === 'cocina') filtered = pedidos.filter(p => p.estado === 'en_cocina');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div>📋</div>Sin pedidos</div>';
    return;
  }

  const statusLabel = { en_cocina: 'En cocina', listo: 'Listo ✓', nuevo: 'Nuevo', en_entrega: 'En entrega', entregado: 'Entregado' };
  const statusClass = { en_cocina: 'status-cocina', listo: 'status-listo', nuevo: 'status-nuevo', en_entrega: 'status-entrega', entregado: '' };

  list.innerHTML = filtered.map(p => `
    <div class="order-card">
      <div class="order-header">
        <div class="order-num">${p.num}</div>
        <div class="order-meta">
          <div class="order-client">Presencial · ${p.pago}</div>
          <div class="order-time">${p.hora}</div>
        </div>
        <div class="order-status ${statusClass[p.estado]}">${statusLabel[p.estado]}</div>
      </div>
      <div class="order-items">${p.items}</div>
      <div class="order-footer">
        <div class="order-total">${fmt(p.total)}</div>
        <div class="order-actions">
          ${p.estado === 'en_cocina' ? `<span style="font-size:12px;color:var(--yellow);">⏳ Esperando cocina</span>` : ''}
          ${p.estado === 'listo' ? `<button class="act-btn green" onclick="advanceOrder('${p.uuid}')">Entregar ✓</button>` : ''}
          ${p.estado === 'nuevo' ? `<button class="act-btn green" onclick="advanceOrder('${p.uuid}')">→ Cocina</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

async function advanceOrder(uuid) {
  const p = pedidos.find(x => x.uuid === uuid);
  if (!p) return;
  const next = { listo: 'entregado' };
  const nuevoEstado = next[p.estado];
  if (!nuevoEstado) return;
  try {
    const campos = { estado: nuevoEstado };
    if (nuevoEstado === 'entregado') campos.hora_entrega = new Date().toISOString();
    await sbPatch(`pedidos?id=eq.${uuid}`, campos);
    await cargarPedidos();
  } catch(err) {
    alert('Error: ' + err.message);
  }
}

// ── VIEWS ─────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.tab')[v === 'nuevo' ? 0 : 1].classList.add('active');
  if (v === 'pedidos') renderOrders();
}

// ── CARGAR MENÚ ───────────────────────────────────────
async function cargarMenu() {
  try {
    const data = await sbGet('productos?order=categoria,nombre');
    const catMap = { hamburguesa: 'hamburguesa', perro: 'perro', especial: 'especial', bebida: 'bebida', combo: 'especial' };
    MENU = data.map(p => ({
      id: p.id,
      nombre: p.nombre,
      cat: catMap[p.categoria] || 'especial',
      desc: p.descripcion || '',
      precio: p.precio
    }));
  } catch(err) {
    console.error('Error cargando menú:', err);
  }
}

// ── CARGAR PEDIDOS ACTIVOS ────────────────────────────
async function cargarPedidos() {
  try {
    const data = await sbGet(
      'pedidos?select=id,numero_pedido,estado,total,hora_cocina,hora_creacion,notas,metodos_pago(nombre),items_pedido(cantidad,productos(nombre))&estado=neq.entregado&tipo_entrega=eq.presencial&order=hora_creacion.desc'
    );
    pedidos = data.map(p => ({
      uuid: p.id,
      num: `AM-${String(p.numero_pedido).padStart(4,'0')}`,
      estado: p.estado,
      total: p.total,
      pago: p.metodos_pago?.nombre || '—',
      hora: new Date(p.hora_creacion).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }),
      items: (p.items_pedido || []).map(i => `${i.cantidad}× ${i.productos?.nombre || '?'}`).join(', ')
        + (p.notas ? ` — ${p.notas}` : '')
    }));
    updatePedidosCount();
    renderOrders();
  } catch(err) {
    console.error('Error cargando pedidos:', err);
  }
}

// ── INIT ──────────────────────────────────────────────
async function cargarMetodosPago() {
  try {
    const data = await sbGet('metodos_pago?order=nombre');
    const row = document.getElementById('pago-row');
    row.innerHTML = data.map((m, i) => `
      <button class="pago-btn ${i === 0 ? 'active' : ''}"
        onclick="selectPago(this, '${m.id}', '${m.nombre}')">${m.nombre}</button>
    `).join('');
    // Seleccionar el primero por defecto
    if (data.length > 0) pagoSelected = { id: data[0].id, nombre: data[0].nombre };
  } catch(err) {
    console.error('Error cargando métodos de pago:', err);
  }
}

async function init() {
  await cargarMenu();
  await cargarMetodosPago();
  renderProducts('all');
  updateCart();
  await cargarPedidos();
  setInterval(cargarPedidos, 30000);
}
init();
</script>

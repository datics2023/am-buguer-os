<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AM Burguer — Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h1 {
      font-size: 1.6rem;
      color: #f5a623;
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #f5f5f5;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: #f5a623;
    }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #f5a623;
      color: #111;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #error-msg {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #ff6b6b;
      text-align: center;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>🍔 AM Burguer</h1>
    <p>Panel de operaciones</p>
  </div>

  <label for="email">Correo</label>
  <input type="email" id="email" placeholder="admin1@amburguer.co" autocomplete="username" />

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

  <button id="btn-login">Ingresar</button>
  <div id="error-msg"></div>
</div>

<script>
  const SUPABASE_URL = 'https://ezvjjudhvothkiqyfxtl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dmpqdWRodm90aGtpcXlmeHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjk4ODYsImV4cCI6MjA5MDgwNTg4Nn0.rMLPardNjEIoXkvQIPRxAXjjATBKBUwnPm67oU1ZjM8';
  const ROLE_MAP = {
    'admin1@amburguer.co':       'andrea-v1.html',
    'cocina@amburguer.co':       'cocina-v2.html',
    'domiciliario@amburguer.co': 'domiciliario-v1.html'
  };

  const btn = document.getElementById('btn-login');
  const errMsg = document.getElementById('error-msg');

  btn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errMsg.textContent = 'Ingresa correo y contraseña.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    errMsg.textContent = '';

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok || !data.access_token) {
        errMsg.textContent = 'Correo o contraseña incorrectos.';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        return;
      }

      // Guardar sesión en localStorage en formato que espera Supabase JS
      const storageKey = `sb-${SUPABASE_URL.split('//')[1].split('.')[0]}-auth-token`;
      localStorage.setItem(storageKey, JSON.stringify(data));

      const origen = sessionStorage.getItem('am_redirect');
      sessionStorage.removeItem('am_redirect');
      const destino = origen || ROLE_MAP[data.user?.email] || 'login.html';
      window.location.replace(destino);

    } catch (e) {
      errMsg.textContent = 'Error de conexión. Intenta de nuevo.';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });

  // Enter para enviar
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btn.click();
  });
</script>

</body>
</html>
